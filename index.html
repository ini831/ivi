<!DOCTYPE html>
<html lang="zh-CN" class="dark">

    <script>

    </script>
    <style>
        body { background-color: #050505; font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white antialiased">

    <nav class="flex justify-between items-center px-10 py-6">
        <div class="text-xl font-bold tracking-tighter">NexAI</div>
        <div class="space-x-8 text-sm text-gray-400">
            <a href="#" class="hover:text-white transition">产品</a>
            <a href="#" class="hover:text-white transition">开发者</a>
            <a href="#" class="bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition">登录</a>

    <main class="max-w-4xl mx-auto mt-20 text-center px-4">
        <h1 class="text-6xl font-extrabold tracking-tighter mb-6 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">

        <div class="flex justify-center gap-4">
            <button class="bg-blue-600 px-8 py-3 rounded-lg font-medium hover:bg-blue-500 transition shadow-[0_0_20px_rgba(59,130,246,0.3)]">

            </button>
            <button class="glass px-8 py-3 rounded-lg font-medium hover:bg-white/10 transition">

            </button>
        </div>
    </main>

    <section class="max-w-5xl mx-auto mt-32 px-4 grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="glass p-6 rounded-2xl md:col-span-2 min-h-[200px]">
            <h3 class="text-lg font-semibold">高性能推理</h3>
            <p class="text-sm text-gray-500 mt-2">毫秒级延迟，适配各类复杂业务逻辑。</p>

        <div class="glass p-6 rounded-2xl min-h-[200px]">
